<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RE:Set 留言墙 | 便利贴+评论+私信</title>
    <style>
        /* 样式与之前完全相同，此处省略以节省篇幅，请使用您之前正常工作的版本 */
        /* 只需在 chat-input-area 内增加匿名复选框样式即可，其余样式不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0ebe1; background-image: radial-gradient(#d4c9b8 1px, transparent 1px); background-size: 30px 30px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; min-height: 100vh; }
        .app { max-width: 1400px; margin: 0 auto; }
        /* ... 其余样式保持不变，请使用您本地的完整样式表 ... */
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
    <!-- ... 头部、昵称卡片、标签页等保持原样 ... -->
    <div id="tab2" class="tab-content">
        <div class="private-layout">
            <div class="contact-list">
                <div class="contact-header"><span>📋 联系人</span><button class="new-chat-btn" id="newChatBtn">+ 新聊天</button></div>
                <div class="contact-items" id="contactList">加载中...</div>
            </div>
            <div class="chat-area">
                <div class="chat-header" id="chatHeader" style="display: none;"><div class="avatar" id="chatAvatar">?</div><h3 id="chatWithName">选择联系人</h3><button id="deleteUserBtn" class="delete-user-btn" style="display:none;">🗑️ 删除用户</button></div>
                <div class="chat-messages" id="chatMessages"><div class="empty-chat">💬 留下你想对TA说的悄悄话吧～</div></div>
                <div class="chat-input-area" id="chatInputArea" style="display: none;">
                    <input type="text" id="chatMessageInput" placeholder="输入消息...">
                    <label style="display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #547443; white-space: nowrap;">
                        <input type="checkbox" id="anonymousToggle"> 🕶️ 匿名发送
                    </label>
                    <button id="sendChatBtn">发送</button>
                </div>
            </div>
        </div>
    </div>
    <!-- ... 模态框等保持不变 ... -->
</div>

<script>
    const SUPABASE_URL = "https://chfanuzhklzzawbcazjp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_7yvNBNHbSe-2cPbQ-yiXpA_z6dr1DYf";
    const ADMIN_PASSWORD = "reset2024";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = "";
    let isAdmin = false;
    let currentContact = null;
    let currentPage = 1;
    const PAGE_SIZE = 10;
    let totalMessages = 0;
    let isLoadingMore = false;
    
    // 模态框函数（保持原样）
    function showMessageModal(message) {
        const modal = document.getElementById('successModal');
        if (!modal) return;
        const msgSpan = document.getElementById('successMessage');
        msgSpan.innerText = message;
        modal.style.display = 'flex';
        const closeBtn = document.getElementById('closeSuccessModal');
        closeBtn.onclick = () => modal.style.display = 'none';
        const overlay = modal.querySelector('.modal-overlay');
        if (overlay) overlay.onclick = (e) => { if (e.target === overlay) modal.style.display = 'none'; };
    }
    
    function showConfirm(message, onConfirm) {
        const modal = document.getElementById('confirmModal');
        if (!modal) return;
        const msgSpan = document.getElementById('confirmMessage');
        msgSpan.innerText = message;
        modal.style.display = 'flex';
        const yesBtn = document.getElementById('confirmYes');
        const noBtn = document.getElementById('confirmNo');
        yesBtn.onclick = () => {
            modal.style.display = 'none';
            if (onConfirm) onConfirm();
        };
        noBtn.onclick = () => modal.style.display = 'none';
        const overlay = modal.querySelector('.modal-overlay');
        if (overlay) overlay.onclick = (e) => { if (e.target === overlay) modal.style.display = 'none'; };
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function formatTime(ts) { let d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
    
    // 获取所有用户（排除当前用户和“匿名用户”）
    async function getAllUsers() {
        const { data, error } = await supabaseClient.from('users').select('username');
        if (error) return [];
        return data.map(u => u.username).filter(u => u !== currentUser && u !== "匿名用户");
    }
    
    // ========== 便利贴相关（与原版相同） ==========
    async function loadPublic(page = 1, append = false) {
        // 与原版相同，省略以节省篇幅，请使用您本地的完整函数
        // ... 
    }
    async function refreshPublic() { currentPage = 1; await loadPublic(1, false); }
    window.toggleReplyInput = (msgId) => { /* 原样 */ };
    window.submitReply = async (msgId) => { /* 原样 */ };
    window.deleteReply = async (replyId, msgId) => { /* 原样 */ };
    window.deletePublic = async (id) => { /* 原样 */ };
    async function postPublic() { /* 原样 */ }
    
    // ========== 私信相关（修改版 ==========
    async function loadContacts() {
        if (!currentUser) { document.getElementById('contactList').innerHTML = '<div class="empty-contact">请先设置昵称</div>'; return; }
        const { data, error } = await supabaseClient.from('private_messages').select('fromUser,toUser').or(`fromUser.eq.${currentUser},toUser.eq.${currentUser}`);
        if (error) return;
        const contactSet = new Set();
        data.forEach(m => {
            // 不将“匿名用户”添加到联系人列表
            if (m.fromUser === currentUser && m.toUser !== "匿名用户") contactSet.add(m.toUser);
            if (m.toUser === currentUser && m.fromUser !== "匿名用户") contactSet.add(m.fromUser);
        });
        const contacts = Array.from(contactSet);
        const container = document.getElementById('contactList');
        if (!contacts.length) { container.innerHTML = '<div class="empty-contact">💬 暂无联系人<br>点击"+ 新聊天"开始对话</div>'; return; }
        container.innerHTML = '';
        for (let contact of contacts) {
            const { data: msgs } = await supabaseClient
                .from('private_messages')
                .select('content')
                .or(`and(fromUser.eq.${currentUser},toUser.eq.${contact}),and(fromUser.eq.${contact},toUser.eq.${currentUser})`)
                .order('timestamp', { ascending: false })
                .limit(1);
            const lastMsg = msgs?.[0]?.content || '';
            container.innerHTML += `<div class="contact-item" onclick="selectContact('${escapeHtml(contact)}')"><div class="contact-avatar">${escapeHtml(contact.charAt(0).toUpperCase())}</div><div class="contact-info"><div class="contact-name">${escapeHtml(contact)}</div><div class="contact-preview">${escapeHtml(lastMsg.slice(0,30))}</div></div><div class="contact-badge">📬</div></div>`;
        }
        if (currentContact) {
            const active = document.querySelector(`.contact-item[onclick="selectContact('${currentContact}')"]`);
            if (active) active.classList.add('active');
        }
    }
    
    async function getMessagesWith(user) {
        const { data, error } = await supabaseClient
            .from('private_messages')
            .select('*')
            .or(`and(fromUser.eq.${currentUser},toUser.eq.${user}),and(fromUser.eq.${user},toUser.eq.${currentUser})`)
            .order('timestamp', { ascending: true });
        if (error) return [];
        return data;
    }
    
    window.selectContact = async (contact) => {
        if (!currentUser) return;
        currentContact = contact;
        const msgs = await getMessagesWith(contact);
        const container = document.getElementById('chatMessages');
        if (!msgs.length) container.innerHTML = '<div class="empty-chat">💬 留下你想对TA说的悄悄话吧～</div>';
        else {
            container.innerHTML = msgs.map(m => {
                const isSender = (m.fromUser === currentUser) || (m.fromUser === "匿名用户" && currentUser !== "匿名用户");
                let senderName = "";
                if (isSender) {
                    senderName = m.fromUser === "匿名用户" ? "我（匿名）" : "我";
                } else {
                    senderName = m.fromUser === "匿名用户" ? "匿名用户" : m.fromUser;
                }
                const canDelete = isSender || isAdmin;
                return `<div class="chat-bubble ${isSender ? 'bubble-sent' : 'bubble-received'}">
                            <div class="bubble-content">
                                ${senderName !== "我" && senderName !== "我（匿名）" ? `<strong>${escapeHtml(senderName)}</strong><br>` : ''}
                                ${escapeHtml(m.content)}
                            </div>
                            <div class="bubble-info">
                                <span>${formatTime(m.timestamp)}</span>
                                ${canDelete ? `<button class="delete-private-msg" data-id="${m.id}" style="background:none; border:none; color:#94a3b8; cursor:pointer;">删除</button>` : ''}
                            </div>
                        </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
            // 绑定私信删除事件
            document.querySelectorAll('.delete-private-msg').forEach(btn => {
                btn.onclick = () => deletePrivateMsg(btn.getAttribute('data-id'));
            });
        }
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('chatInputArea').style.display = 'flex';
        document.getElementById('chatAvatar').innerText = contact.charAt(0).toUpperCase();
        document.getElementById('chatWithName').innerText = contact;
        document.getElementById('deleteUserBtn').style.display = (isAdmin && contact !== currentUser) ? 'inline-block' : 'none';
        document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
        const active = document.querySelector(`.contact-item[onclick="selectContact('${contact}')"]`);
        if (active) active.classList.add('active');
        document.getElementById('chatMessageInput').focus();
        // 重置匿名复选框
        const anonCheckbox = document.getElementById('anonymousToggle');
        if (anonCheckbox) anonCheckbox.checked = false;
    };
    
    async function deletePrivateMsg(id) {
        showConfirm('⚠️ 删除这条消息？', async () => {
            const { error } = await supabaseClient.from('private_messages').delete().eq('id', id);
            if (!error) {
                if (currentContact) await window.selectContact(currentContact);
                await loadContacts();
                showMessageModal('消息已删除');
            } else {
                showMessageModal('删除失败');
            }
        });
    }
    
    // 修改后的发送函数（支持匿名）
    async function sendPrivateMessage(fromUser, toUser, content) {
        if (!content.trim()) return false;
        const { error } = await supabaseClient.from('private_messages').insert({ 
            fromUser: fromUser, 
            toUser: toUser, 
            content: content.trim(), 
            timestamp: Date.now() 
        });
        return !error;
    }
    
    window.sendToCurrent = async () => {
        if (!currentUser || !currentContact) return;
        const input = document.getElementById('chatMessageInput');
        const content = input.value.trim();
        if (!content) return;
        
        const isAnonymous = document.getElementById('anonymousToggle')?.checked || false;
        const fromName = isAnonymous ? "匿名用户" : currentUser;
        
        input.value = '';
        const success = await sendPrivateMessage(fromName, currentContact, content);
        if (success) {
            await loadContacts();
            await window.selectContact(currentContact);
            showMessageModal(isAnonymous ? '匿名私信已发送' : '私信已发送');
            // 发送后重置复选框
            if (document.getElementById('anonymousToggle')) document.getElementById('anonymousToggle').checked = false;
        } else {
            showMessageModal('发送失败，请稍后重试');
            input.value = content;
        }
    };
    
    // ========== 设置昵称等函数（与原版相同） ==========
    async function setUserName() {
        let newName = document.getElementById('nicknameInput').value.trim();
        if (!newName) { showMessageModal('请输入昵称'); return; }
        // 不允许使用“匿名用户”作为昵称
        if (newName === "匿名用户") { showMessageModal('该昵称不可用，请换一个'); return; }
        const { data: existing } = await supabaseClient.from('users').select('username').eq('username', newName).maybeSingle();
        if (existing) { showMessageModal('该昵称已被使用，请换一个'); return; }
        const { error } = await supabaseClient.from('users').insert({ username: newName });
        if (error) { showMessageModal('设置失败：' + error.message); return; }
        currentUser = newName;
        localStorage.setItem('wall_user_saved', currentUser);
        document.getElementById('currentUserBadge').innerHTML = `👤 ${escapeHtml(currentUser)} ▼`;
        document.getElementById('nicknameInput').disabled = true;
        document.getElementById('setNameBtn').disabled = true;
        document.getElementById('nicknameInput').value = currentUser;
        await loadContacts();
        await refreshPublic();
        showMessageModal(`昵称 "${currentUser}" 设置成功！`);
    }
    
    // 管理员改名函数（需确保 RPC 存在，保持不变）
    async function adminChangeName() {
        if (!isAdmin) return;
        const oldName = prompt('输入要修改的用户昵称：');
        if (!oldName) return;
        if (oldName === "匿名用户") { showMessageModal('不能修改“匿名用户”'); return; }
        const newName = prompt('输入新昵称：');
        if (!newName) return;
        const { error } = await supabaseClient.rpc('admin_rename_user', { old_name: oldName, new_name: newName });
        if (error) showMessageModal('改名失败：' + error.message);
        else {
            showMessageModal(`用户 "${oldName}" 已改名为 "${newName}"`);
            if (currentUser === oldName) {
                currentUser = newName;
                localStorage.setItem('wall_user_saved', currentUser);
                document.getElementById('currentUserBadge').innerHTML = `👤 ${escapeHtml(currentUser)} ▼`;
                if (currentContact === oldName) currentContact = newName;
            }
            await refreshPublic();
            await loadContacts();
            if (currentContact) await window.selectContact(currentContact);
        }
    }
    
    async function adminDeleteUserFromList(username) {
        if (!isAdmin || username === currentUser) { showMessageModal('不能删除自己'); return; }
        if (username === "匿名用户") { showMessageModal('不能删除匿名用户'); return; }
        showConfirm(`⚠️ 确定删除用户 "${username}" 及其所有数据？`, async () => {
            const { error } = await supabaseClient.rpc('admin_delete_user', { target_name: username });
            if (error) showMessageModal('删除失败：' + error.message);
            else {
                showMessageModal(`用户 "${username}" 已删除`);
                if (currentContact === username) {
                    currentContact = null;
                    document.getElementById('chatHeader').style.display = 'none';
                    document.getElementById('chatInputArea').style.display = 'none';
                    document.getElementById('chatMessages').innerHTML = '<div class="empty-chat">💬 留下你想对TA说的悄悄话吧～</div>';
                }
                await refreshPublic();
                await loadContacts();
                document.getElementById('userListModal').style.display = 'none';
            }
        });
    }
    
    async function openUserListModal() {
        if (!isAdmin) return;
        const users = await getAllUsers();
        const container = document.getElementById('allUsersList');
        container.innerHTML = users.map(u => `<div class="user-item"><div><span class="user-avatar-small">${escapeHtml(u.charAt(0).toUpperCase())}</span><span>${escapeHtml(u)}</span></div><button class="user-delete-btn" onclick="adminDeleteUserFromList('${escapeHtml(u)}')">🗑️ 删除</button></div>`).join('');
        document.getElementById('userListModal').style.display = 'flex';
        const searchInput = document.getElementById('searchUserListInput');
        if (searchInput) {
            searchInput.oninput = (e) => {
                const kw = e.target.value.toLowerCase();
                const filtered = users.filter(u => u.toLowerCase().includes(kw));
                container.innerHTML = filtered.map(u => `<div class="user-item"><div>${escapeHtml(u)}</div><button onclick="adminDeleteUserFromList('${escapeHtml(u)}')">删除</button></div>`).join('');
            };
        }
    }
    
    // 新聊天弹窗（排除匿名用户）
    async function openSearchModal() {
        if (!currentUser) { showMessageModal('请先设置昵称'); return; }
        const users = await getAllUsers();
        const modal = document.getElementById('searchUserModal');
        const resultsDiv = document.getElementById('searchResults');
        const searchInput = document.getElementById('searchUserInput');
        
        function renderUsers(list) {
            if (list.length === 0) {
                resultsDiv.innerHTML = '<div style="padding:20px; text-align:center;">😢 没有找到用户</div>';
                return;
            }
            resultsDiv.innerHTML = list.map(u => `
                <div class="user-item">
                    <div>${escapeHtml(u)}</div>
                    <button class="user-select-btn" onclick="startChatWith('${escapeHtml(u)}')">💬 发消息</button>
                </div>
            `).join('');
        }
        
        renderUsers(users);
        searchInput.value = '';
        searchInput.oninput = (e) => {
            const kw = e.target.value.toLowerCase();
            const filtered = users.filter(u => u.toLowerCase().includes(kw));
            renderUsers(filtered);
        };
        modal.style.display = 'flex';
        setTimeout(() => searchInput.focus(), 100);
    }
    
    window.startChatWith = async (user) => {
        if (user === currentUser) { showMessageModal('不能和自己聊天'); return; }
        document.getElementById('searchUserModal').style.display = 'none';
        await loadContacts();
        await window.selectContact(user);
    };
    
    // 管理员登录等函数（与原版相同）
    function openAdminLogin() { document.getElementById('adminLoginModal').style.display = 'flex'; document.getElementById('adminPasswordInput').value = ''; }
    function verifyAdmin() {
        if (document.getElementById('adminPasswordInput').value === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById('adminBadge').style.display = 'inline-block';
            document.getElementById('adminActions').style.display = 'flex';
            document.getElementById('adminLoginModal').style.display = 'none';
            showMessageModal('管理员模式已启用');
            refreshPublic();
            if (currentContact) window.selectContact(currentContact);
        } else showMessageModal('密码错误');
    }
    function exitAdmin() {
        isAdmin = false;
        document.getElementById('adminBadge').style.display = 'none';
        document.getElementById('adminActions').style.display = 'none';
        document.getElementById('deleteUserBtn').style.display = 'none';
        showMessageModal('已退出管理员模式');
        refreshPublic();
        if (currentContact) window.selectContact(currentContact);
    }
    
    // 事件绑定
    document.getElementById('setNameBtn').onclick = setUserName;
    document.getElementById('postPublicBtn').onclick = postPublic;
    document.getElementById('sendChatBtn').onclick = window.sendToCurrent;
    document.getElementById('newChatBtn').onclick = openSearchModal;
    document.getElementById('closeSearchModal').onclick = () => document.getElementById('searchUserModal').style.display = 'none';
    document.getElementById('closeUserListBtn').onclick = () => document.getElementById('userListModal').style.display = 'none';
    document.getElementById('adminLoginBtn').onclick = openAdminLogin;
    document.getElementById('confirmAdminLogin').onclick = verifyAdmin;
    document.getElementById('cancelAdminLogin').onclick = () => document.getElementById('adminLoginModal').style.display = 'none';
    document.getElementById('exitAdminBtn').onclick = exitAdmin;
    document.getElementById('resetNameBtn').onclick = adminChangeName;
    document.getElementById('showUsersBtn').onclick = openUserListModal;
    document.getElementById('deleteUserBtn').onclick = async () => {
        if (currentContact) {
            showConfirm(`⚠️ 删除用户 ${currentContact}？`, async () => {
                await supabaseClient.rpc('admin_delete_user', { target_name: currentContact });
                showMessageModal('用户已删除');
                currentContact = null;
                await refreshPublic();
                await loadContacts();
                document.getElementById('chatHeader').style.display = 'none';
                document.getElementById('chatInputArea').style.display = 'none';
                document.getElementById('chatMessages').innerHTML = '<div class="empty-chat">💬 留下你想对TA说的悄悄话吧～</div>';
            });
        }
    };
    document.getElementById('chatMessageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') window.sendToCurrent(); });
    document.getElementById('userMenu').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('userDropdown').classList.toggle('show'); });
    document.addEventListener('click', () => document.getElementById('userDropdown').classList.remove('show'));
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(btn.dataset.tab).classList.add('active');
            if (btn.dataset.tab === 'tab2' && currentUser) loadContacts();
        });
    });
    
    (async () => {
        const saved = localStorage.getItem('wall_user_saved');
        if (saved) {
            const { data } = await supabaseClient.from('users').select('username').eq('username', saved).maybeSingle();
            if (data) {
                currentUser = saved;
                document.getElementById('currentUserBadge').innerHTML = `👤 ${escapeHtml(currentUser)} ▼`;
                document.getElementById('nicknameInput').disabled = true;
                document.getElementById('setNameBtn').disabled = true;
                document.getElementById('nicknameInput').value = currentUser;
            } else {
                localStorage.removeItem('wall_user_saved');
            }
        }
        await refreshPublic();
        if (currentUser) await loadContacts();
        
        supabaseClient.channel('public-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'public_messages' }, () => refreshPublic())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'public_message_replies' }, () => refreshPublic())
            .subscribe();
        supabaseClient.channel('private-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'private_messages' }, async () => {
                if (currentUser) { await loadContacts(); if (currentContact) await window.selectContact(currentContact); }
            })
            .subscribe();
    })();
</script>
</body>
</html>
